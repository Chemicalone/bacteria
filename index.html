<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bacterial Colony</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #03070e;
    --accent:      #00df88;
    --accent-dim:  #006644;
    --accent-glow: #00df8855;
    --red:         #ff2f55;
    --red-glow:    #ff2f5566;
    --text:        #5a8870;
    --text-bright: #b0ffd8;
    --border:      #00df8820;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px 12px 24px;
    overflow-y: auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* Subtle scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      #00000018 2px,
      #00000018 4px
    );
    pointer-events: none;
    z-index: 10;
    will-change: transform;
  }

  header {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lab-label {
    font-size: clamp(0.5rem, 2.2vw, 0.6rem);
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1rem, 5vw, 1.35rem);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-shadow: 0 0 30px var(--accent-glow), 0 0 60px #00df8822;
  }

  /* ── Canvas wrapper ── */
  .canvas-shell {
    position: relative;
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px #00df8808,
      0 0 40px #00df8814,
      inset 0 0 60px #00000055;
    /* Full width on mobile */
    width: min(100%, 600px);
    aspect-ratio: 1 / 1;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* vignette */
  .canvas-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      #03070ecc 100%);
    pointer-events: none;
  }

  /* REC badge */
  .rec {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: clamp(0.5rem, 2vw, 0.6rem);
    letter-spacing: 0.2em;
    color: var(--red);
    text-shadow: 0 0 8px var(--red-glow);
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .rec.on { opacity: 1; }
  .rec-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Phase indicator ── */
  .phase {
    font-size: clamp(0.6rem, 2.5vw, 0.7rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    min-height: 1.2em;
    text-align: center;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .phase.dying {
    color: var(--red);
    text-shadow: 0 0 12px var(--red-glow);
  }
  .phase.born {
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent-glow);
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 600px;
    justify-content: space-around;
    border: 1px solid var(--border);
    padding: 10px 0;
  }

  .stat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
  }
  .stat-label {
    font-size: clamp(0.45rem, 2vw, 0.55rem);
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: uppercase;
  }
  .stat-val {
    font-size: clamp(1.2rem, 6vw, 1.6rem);
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 14px var(--accent-glow);
    min-width: 3ch;
    text-align: center;
  }

  .sep {
    width: 1px;
    height: 36px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── Controls grid ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }

  .control-card {
    border: 1px solid var(--border);
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ── Steps input ── */
  .input-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  input[type="number"] {
    background: #070f18;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: inherit;
    font-size: clamp(0.9rem, 4vw, 1.1rem);
    padding: 10px 8px;
    width: 100%;
    max-width: 120px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    /* Prevent zoom on iOS */
    font-size: 16px;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ── Fertility slider ── */
  .slider-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .slider-bound {
    font-size: clamp(0.55rem, 2vw, 0.65rem);
    color: var(--accent-dim);
    letter-spacing: 0.1em;
    width: 1.8ch;
    text-align: center;
    flex-shrink: 0;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 6px;
    background: linear-gradient(to right, var(--accent) var(--pct, 11%), #0d2a1e var(--pct, 11%));
    outline: none;
    cursor: pointer;
    border-radius: 3px;
    /* Large touch target via padding */
    padding: 14px 0;
    background-clip: content-box;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 32px;
    height: 32px;
    background: var(--accent);
    box-shadow: 0 0 14px var(--accent-glow);
    border-radius: 50%;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    border: 2px solid #03070e;
  }
  input[type="range"]::-moz-range-thumb {
    width: 32px;
    height: 32px;
    background: var(--accent);
    box-shadow: 0 0 14px var(--accent-glow);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #03070e;
  }
  input[type="range"]:active::-webkit-slider-thumb {
    box-shadow: 0 0 24px var(--accent);
    transform: scale(1.15);
  }

  .slider-val {
    font-size: clamp(1.1rem, 5vw, 1.4rem);
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 12px var(--accent-glow);
    min-width: 2ch;
    text-align: center;
  }

  /* ── Buttons ── */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 600px;
  }

  button {
    background: transparent;
    border: 1px solid currentColor;
    color: var(--accent);
    font-family: inherit;
    font-size: clamp(0.7rem, 3vw, 0.85rem);
    letter-spacing: 0.2em;
    padding: 16px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    touch-action: manipulation;
    min-height: 52px;
  }
  button:hover {
    background: #00df8812;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  button:active { transform: scale(0.96); }

  button.stop-btn {
    color: var(--red);
  }
  button.stop-btn:hover {
    background: #ff2f5512;
    box-shadow: 0 0 16px var(--red-glow);
  }

  /* ── Desktop layout override ── */
  @media (min-width: 640px) {
    body { justify-content: center; padding: 24px; }

    .controls {
      grid-template-columns: auto auto;
      width: auto;
    }

    .btn-row {
      width: auto;
      min-width: 300px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="lab-label">Laboratorio di Simulazione · Coltura Batterica</div>
  <h1>BACTERIAL COLONY</h1>
</header>

<div class="canvas-shell" id="shell">
  <canvas id="canvas"></canvas>
  <div class="rec" id="rec"><div class="rec-dot"></div> SIM</div>
</div>

<div class="phase" id="phase"></div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-label">Generazione</div>
    <div class="stat-val" id="gen">0</div>
  </div>
  <div class="sep"></div>
  <div class="stat-box">
    <div class="stat-label">Vivi</div>
    <div class="stat-val" id="cnt">1</div>
  </div>
  <div class="sep"></div>
  <div class="stat-box">
    <div class="stat-label">Morti</div>
    <div class="stat-val" id="dead" style="color: var(--red); text-shadow: 0 0 14px var(--red-glow);">0</div>
  </div>
</div>

<div class="controls">
  <div class="control-card input-wrap">
    <div class="stat-label">Passi</div>
    <input type="number" id="stepsInput" value="200" min="1" max="9999" inputmode="numeric">
  </div>
  <div class="control-card slider-wrap">
    <div class="stat-label">Fertilità</div>
    <div class="slider-row">
      <span class="slider-bound">1</span>
      <input type="range" id="fertSlider" min="1" max="10" value="2"
             oninput="updateFertility(this.value)">
      <span class="slider-bound">10</span>
    </div>
    <div class="slider-val" id="fertVal">2</div>
  </div>
  <div class="control-card slider-wrap" style="grid-column: 1 / -1;">
    <div class="stat-label">Velocità</div>
    <div class="slider-row">
      <span class="slider-bound" style="width:3ch">🐢</span>
      <input type="range" id="speedSlider" min="1" max="7" value="4"
             oninput="updateSpeed(this.value)">
      <span class="slider-bound" style="width:3ch">⚡</span>
    </div>
    <div class="slider-val" id="speedVal">500ms</div>
  </div>
</div>

<div class="btn-row">
  <button id="mainBtn" onclick="toggleSim()">AVVIA</button>
  <button class="stop-btn" onclick="resetSim()">RESET</button>
</div>

<script>
/* ───────────── CONFIG ───────────── */
const N            = 50;
const CELL         = 12;
let   PESO_LIBERA  = 2;
const PESO_OCCUP   = 1;
let   STEP_MS      = 500;
const FLASH_MS     = 170;

/* Speed levels: 1=slowest … 7=fastest */
const SPEED_LEVELS = [2000, 1000, 500, 250, 100, 40, 10];
const SPEED_LABELS = ['2s', '1s', '500ms', '250ms', '100ms', '40ms', '10ms'];

function updateSpeed(val) {
  const idx = parseInt(val) - 1;
  STEP_MS = SPEED_LEVELS[idx];
  document.getElementById('speedVal').textContent = SPEED_LABELS[idx];
  const pct = ((val - 1) / 6 * 100).toFixed(1);
  document.getElementById('speedSlider').style.setProperty('--pct', pct + '%');
}

const dx = [-1, 1, 0, 0];
const dy = [ 0, 0,-1, 1];

/* ───────────── CANVAS ───────────── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = N * CELL;
canvas.height = N * CELL;

/* ───────────── STATE ───────────── */
let grid, bacteria, stepCount, totalDead, maxSteps, running, timer;

function init() {
  grid     = Array.from({length: N}, () => new Uint8Array(N));
  bacteria = [];
  stepCount  = 0;
  totalDead  = 0;
  running    = false;
  clearTimeout(timer);

  const x = Math.floor(Math.random() * N);
  const y = Math.floor(Math.random() * N);
  grid[x][y] = 1;
  bacteria.push({x, y});

  drawGrid(null, null);
  refreshUI();
  setPhase('', '');
  document.getElementById('rec').classList.remove('on');
  document.getElementById('mainBtn').textContent = 'AVVIA';
}

/* ───────────── FERTILITY CONTROL ───────────── */
function updateFertility(val) {
  PESO_LIBERA = parseInt(val);
  document.getElementById('fertVal').textContent = val;
  const pct = ((val - 1) / 9 * 100).toFixed(1);
  document.getElementById('fertSlider').style.setProperty('--pct', pct + '%');
}

/* Init sliders fill on load */
window.addEventListener('DOMContentLoaded', () => {
  updateFertility(document.getElementById('fertSlider').value);
  updateSpeed(document.getElementById('speedSlider').value);
});

/* ───────────── DIRECTION ───────────── */
function pickDir(x, y) {
  const w = [0, 0, 0, 0];
  let total = 0;
  for (let d = 0; d < 4; d++) {
    const nx = x + dx[d], ny = y + dy[d];
    w[d] = (nx < 0 || nx >= N || ny < 0 || ny >= N || grid[nx][ny])
           ? PESO_OCCUP : PESO_LIBERA;
    total += w[d];
  }
  let r = Math.random() * total, cum = 0;
  for (let d = 0; d < 4; d++) { cum += w[d]; if (r < cum) return d; }
  return 3;
}

/* ───────────── SIMULATION STEP ───────────── */
function doStep() {
  if (!running || bacteria.length === 0 || stepCount >= maxSteps) {
    stopSim(bacteria.length === 0 ? 'COLONIA ESTINTA' : 'SIMULAZIONE COMPLETA',
            bacteria.length === 0 ? 'dying' : 'born');
    return;
  }

  const dirs = bacteria.map(b => pickDir(b.x, b.y));

  const morira = Array.from({length: N}, () => new Uint8Array(N));
  let deathCount = 0;
  for (let i = 0; i < bacteria.length; i++) {
    const nx = bacteria[i].x + dx[dirs[i]];
    const ny = bacteria[i].y + dy[dirs[i]];
    if (nx >= 0 && nx < N && ny >= 0 && ny < N && grid[nx][ny]) {
      morira[nx][ny] = 1;
      deathCount++;
    }
  }

  if (deathCount > 0) {
    setPhase('LISI CELLULARE  —  ' + deathCount + ' ELIMINATI', 'dying');
    drawGrid(morira, null);
  }

  setTimeout(() => {
    const newborn = Array.from({length: N}, () => new Uint8Array(N));
    const next = [];

    for (const b of bacteria) {
      if (morira[b.x][b.y]) {
        grid[b.x][b.y] = 0;
        totalDead++;
      } else {
        next.push(b);
      }
    }

    const added = Array.from({length: N}, () => new Uint8Array(N));
    let birthCount = 0;
    for (let i = 0; i < bacteria.length; i++) {
      if (morira[bacteria[i].x][bacteria[i].y]) continue;
      const nx = bacteria[i].x + dx[dirs[i]];
      const ny = bacteria[i].y + dy[dirs[i]];
      if (nx >= 0 && nx < N && ny >= 0 && ny < N && !grid[nx][ny] && !added[nx][ny]) {
        grid[nx][ny] = 1;
        next.push({x: nx, y: ny});
        added[nx][ny] = 1;
        newborn[nx][ny] = 1;
        birthCount++;
      }
    }

    bacteria = next;
    stepCount++;

    if (birthCount > 0)
      setPhase('PROLIFERAZIONE  —  ' + birthCount + ' NATI', 'born');
    else if (deathCount === 0)
      setPhase('', '');

    drawGrid(null, newborn);
    refreshUI();

    if (bacteria.length === 0 || stepCount >= maxSteps) {
      stopSim(bacteria.length === 0 ? 'COLONIA ESTINTA' : 'SIMULAZIONE COMPLETA',
              bacteria.length === 0 ? 'dying' : 'born');
      return;
    }
    timer = setTimeout(doStep, STEP_MS - (deathCount > 0 ? FLASH_MS : 0));
  }, deathCount > 0 ? FLASH_MS : 0);
}

/* ───────────── DRAW ───────────── */
function drawGrid(dying, newborn) {
  ctx.fillStyle = '#03070e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#0b1a22';
  for (let i = 0; i < N; i++)
    for (let j = 0; j < N; j++)
      if ((i + j) % 2 === 0)
        ctx.fillRect(j*CELL + CELL/2 - 0.5, i*CELL + CELL/2 - 0.5, 1, 1);

  const r = CELL * 0.36;

  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const cx = j * CELL + CELL / 2;
      const cy = i * CELL + CELL / 2;

      if (dying && dying[i][j]) {
        ctx.save();
        ctx.shadowBlur  = 22;
        ctx.shadowColor = '#ff2f55';
        ctx.fillStyle   = '#ff2f55';
        ctx.beginPath();
        ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur  = 6;
        ctx.shadowColor = '#ffaaaa';
        ctx.fillStyle   = '#ffcccc';
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

      } else if (grid[i][j]) {
        const isNew = newborn && newborn[i][j];
        ctx.save();

        if (isNew) {
          ctx.shadowBlur  = 26;
          ctx.shadowColor = '#aaffd0';
          ctx.fillStyle   = '#ddfff0';
          ctx.beginPath();
          ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.25;
          ctx.shadowBlur  = 14;
          ctx.shadowColor = '#00ffaa';
          ctx.strokeStyle = '#00ffaa';
          ctx.lineWidth   = 1.5;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 1.8, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        } else {
          ctx.shadowBlur  = 14;
          ctx.shadowColor = '#00c870';
          ctx.fillStyle   = '#00a85a';
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          const grad = ctx.createRadialGradient(
            cx - r*0.25, cy - r*0.3, 0,
            cx,           cy,          r
          );
          grad.addColorStop(0, '#00ff9944');
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }
  }
}

/* ───────────── UI HELPERS ───────────── */
function setPhase(text, cls) {
  const el = document.getElementById('phase');
  el.textContent  = text;
  el.className    = 'phase ' + cls;
}

function refreshUI() {
  document.getElementById('gen').textContent  = stepCount;
  document.getElementById('cnt').textContent  = bacteria.length;
  document.getElementById('dead').textContent = totalDead;
}

/* ───────────── CONTROLS ───────────── */
function toggleSim() {
  if (running) {
    running = false;
    clearTimeout(timer);
    document.getElementById('mainBtn').textContent = 'RIPRENDI';
    document.getElementById('rec').classList.remove('on');
    setPhase('IN PAUSA', '');
  } else {
    maxSteps = parseInt(document.getElementById('stepsInput').value) || 200;
    running  = true;
    document.getElementById('mainBtn').textContent = 'PAUSA';
    document.getElementById('rec').classList.add('on');
    doStep();
  }
}

function stopSim(msg, cls) {
  running = false;
  clearTimeout(timer);
  document.getElementById('mainBtn').textContent = 'AVVIA';
  document.getElementById('rec').classList.remove('on');
  setPhase(msg, cls);
  refreshUI();
}

function resetSim() {
  stopSim('', '');
  init();
}

/* ───────────── BOOT ───────────── */
init();
</script>
</body>
</html>
